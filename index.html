<!DOCTYPE html>
<html lang="es">
<head>
    <!-- 
      PROYECTO: Mi Pįgina Web Minimalista
      ESTRUCTURA Y VISOR PDF: Desarrollado en colaboración con Gemini (IA de Google) 
      FECHA: Abril de 2026
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Jes&uacute;s Ruiz</title>
    <style>
        /* CONFIGURACIÓN GENERAL */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            background-color: #f4f4f4;
        }

        .contenedor-principal {
            width: 100%;
            max-width: 800px;
            background-color: #fff;
            border: 2px solid #000;
            display: flex;
            flex-direction: column;
            box-shadow: 10px 10px 0px #000;
        }

        /* CABECERA Y LOGO */
        header {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            border-bottom: 2px solid #000;
            font-size: clamp(20px, 5vw, 35px);
            font-weight: bold;
            gap: 15px;
            padding: 0 15px;
        }

        .logo-header {
            height: 50px;
            width: auto;
            object-fit: contain;
        }

        /* MENŚ DE NAVEGACIÓN */
        nav {
            display: flex;
            border-bottom: 2px solid #000;
            background-color: #fff;
        }

        nav a {
            flex: 1;
            padding: 15px 5px;
            text-align: center;
            text-decoration: underline;
            color: #333;
            font-weight: bold;
            border-right: 2px solid #000;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        nav a:last-child { border-right: none; }

        nav a:hover {
            background-color: #000;
            color: #fff;
        }

        /* CONTENEDOR DEL PDF (CON RECORTE PERSONALIZADO) */
                /* 1. MODIFICA EL CONTENEDOR MAIN */
        main {
            padding: 0;
            height: 85vh;
            /* Cambiamos hidden por auto para permitir scroll */
            overflow-y: auto; 
            overflow-x: hidden; 
            position: relative;
            background-color: #eee;
            border-left: 2px solid #000; /* Opcional: para delimitar el įrea */
        }

        /* 2. AJUSTA EL IFRAME PARA QUE TENGA ALTURA REAL */
        main iframe {
            position: absolute;
            top: -55px;    
            /*left: -400px;*/ 
			right: -10px;
            width: calc(100% + 300px); 
            /* Importante: Dale una altura fija grande o usa un script 
               para que el scroll del 'main' funcione */
            height: 5000px; 
            border: none;
        }

        /* 3. PERSONALIZA LA BARRA DE DESPLAZAMIENTO (ESTILO MINIMALISTA) */
        main::-webkit-scrollbar {
            width: 12px;
        }

        main::-webkit-scrollbar-track {
            background: #fff;
            border-left: 2px solid #000;
        }

        main::-webkit-scrollbar-thumb {
            background: #000;
            border: 2px solid #fff;
        }

        main::-webkit-scrollbar-thumb:hover {
            background: #333;
        }

        /* RESPONSIVE PARA MÓVILES */
        @media (max-width: 600px) {
            header { height: auto; padding: 10px; }
            .logo-header { height: 35px; }
            nav { flex-wrap: wrap; }
            main { height: 70vh; }
            main iframe { left: -40px; width: calc(100% + 60px); }
        }

        .sticky-top {
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: #fff;
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <div class="sticky-top">
            <header>
                <img src="foto.jpg" alt="Logo" class="logo-header">
                <h1 style="margin: 0; font-size: inherit;" id="titulo-dinamico">
                    Cargando tķtulo...
                </h1>
            </header>
            
            <nav>
                <a href="mailto:jesusdetarazona@gmail.com">CONTACTO</a>
                <a href="https://facebook.com" target="_blank">FACEBOOK</a>
                <a href="https://www.avantmedic.com/es/profesionales/dr-jesus-ruiz-perez/" target="_blank">CONSULTA</a>
            </nav>
        </div>

        <main>
            <iframe 
                src="contenido.pdf#toolbar=0&navpanes=0&view=FitH" 
                title="Visor de PDF Integrado">
                <p>Tu navegador no admite visualización de PDFs. 
                   <a href="contenido.pdf">Haz clic aquķ para descargarlo.</a>
                </p>
            </iframe>
        </main>
    </div>

    <script>
        const tituloHeader = document.getElementById('titulo-dinamico');

        async function cargarTitulo() {
            try {
                const respuesta = await fetch('titulo.txt');
                if (respuesta.ok) {
                    tituloHeader.innerText = await respuesta.text();
                } else {
                    tituloHeader.innerText = "Mi Web de Pruebas";
                }
            } catch (e) {
                tituloHeader.innerText = "Mi Web de Pruebas";
            }
        }

        cargarTitulo();
    </script>

</body>
</html>
