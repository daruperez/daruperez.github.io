<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Jes&uacute;s Ruiz</title> <!-- Corregido &uacute; -->
    <style>
        /* CONFIGURACIėN GENERAL */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            background-color: #f4f4f4;
        }

        .contenedor-principal {
            width: 100%;
            max-width: 800px;
            background-color: #fff;
            border: 2px solid #000;
            display: flex;
            flex-direction: column;
            box-shadow: 10px 10px 0px #000;
        }

        header {
            height: 80px;
            display: flex;
            align-items: center;
            border-bottom: 2px solid #000;
            font-size: clamp(20px, 5vw, 35px);
            font-weight: bold;
            gap: 15px;
            padding: 0 15px;
        }

        .logo-header { height: 50px; width: auto; object-fit: contain; }

        nav { display: flex; border-bottom: 2px solid #000; background-color: #fff; }
        nav a {
            flex: 1;
            padding: 15px 5px;
            text-align: center;
            text-decoration: underline;
            color: #333;
            font-weight: bold;
            border-right: 2px solid #000;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        nav a:last-child { border-right: none; }
        nav a:hover { background-color: #000; color: #fff; }

        /* AJUSTE PARA PDF.JS */
        main {
            padding: 0;
            height: 85vh;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            background-color: #eee;
        }

        canvas {
            max-width: 100%;
            height: auto !important;
        }

        .sticky-top { position: sticky; top: 0; z-index: 1000; background-color: #fff; }

        @media (max-width: 600px) {
            header { height: auto; padding: 10px; }
            nav { flex-wrap: wrap; }
            main { height: 70vh; }
        }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <div class="sticky-top">
            <header>
                <img src="foto.jpg" alt="Logo" class="logo-header">
                <h1 style="margin: 0; font-size: inherit;" id="titulo-dinamico">Cargando tĒtulo...</h1>
            </header>
            
            <nav>
                <a href="mailto:jesusdetarazona@gmail.com">CONTACTO</a>
                <a href="https://facebook.com" target="_blank" rel="noopener">FACEBOOK</a>
                <a href="https://www.avantmedic.com/es/profesionales/dr-jesus-ruiz-perez/" target="_blank" rel="noopener">CONSULTA</a>
            </nav>
        </div>

        <main id="contenedor-pdf">
            <canvas id="visor-pdf"></canvas>
        </main>
    </div>

    <!-- LIBRER═A PDF.JS (URLS COMPLETAS OBLIGATORIAS) -->

	<script type="module">
        // 1. IMPORTAMOS LA LIBRER═A (URL REAL COMPLETA)
        import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/5.4.149/pdf.min.mjs';

        // 2. CONFIGURAMOS EL WORKER (URL REAL COMPLETA)
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/5.4.149/pdf.worker.min.mjs';

        const tituloHeader = document.getElementById('titulo-dinamico');

        async function cargarTitulo() {
            try {
                const respuesta = await fetch('titulo.txt');
                if (respuesta.ok) {
                    const texto = await respuesta.text();
                    tituloHeader.innerText = texto.trim();
                } else {
                    tituloHeader.innerText = "Dr. Jesus Ruiz";
                }
            } catch (e) {
                tituloHeader.innerText = "Dr. Jesus Ruiz";
            }
        }

        async function cargarPDF() {
            const url = 'contenido.pdf';
            try {
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;
                const page = await pdf.getPage(1);
                
                const viewport = page.getViewport({ scale: 2 });
                const canvas = document.getElementById('visor-pdf');
                const context = canvas.getContext('2d');

                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };
                
                await page.render(renderContext).promise;
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('contenedor-pdf').innerHTML = 
                    `<p style="padding:20px">Error al cargar PDF. <a href="contenido.pdf">Descargar;</a></p>`;
            }
        }

        cargarTitulo();
        cargarPDF();
    </script>
</body>
</html>
