<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rincón de David</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 5px;
    display: flex;
    justify-content: center;
    background: #f4f4f4;
}

.contenedor-principal {
    max-width: 800px;
    width: 100%;
    background: #fff;
    border: 2px solid #000;
    box-shadow: 10px 10px 0 #000;
}

header {
    display: flex;
    align-items: center;
    padding: 10px;
    border-bottom: 2px solid #000;
    font-weight: bold;
}

.logo-header { height: 50px; }

h1 { margin: 0; font-size: inherit; }

nav {
    display: flex;
    border-bottom: 2px solid #000;
}

nav a {
    flex: 1;
    text-align: center;
    padding: 10px;
    text-decoration: none;
    color: black;
    border-right: 2px solid #000;
}

.tab-activa {
    background: black;
    color: white;
}

main {
    padding: 15px;
    background: #eee;
    min-height: 80vh;
}

.pdf-card {
    border: 2px solid #000;
    margin-bottom: 20px;
    background: white;
    transition: 0.2s;
}

.pdf-card:hover {
    transform: translate(-3px, -3px);
    box-shadow: 13px 13px 0px #000;
}

.pdf-card.expandido {
    box-shadow: 15px 15px 0px #000;
}

.pdf-card.colapsado {
    max-height: 200px;
    overflow: hidden;
}

.pdf-card.colapsado .descripcion {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.info-pdf {
    padding: 10px;
    border-bottom: 2px solid #000;
    display: flex;
    justify-content: space-between;
}

.titulo-archivo {
    font-weight: bold;
}

.descripcion {
    padding: 10px;
    font-size: 13px;
    color: #333;
}

.btn-leer-mas {
    background: black;
    color: white;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
}

.btn-leer-mas:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.loader {
    padding: 20px;
    text-align: center;
}
</style>
</head>

<body>

<div class="contenedor-principal">

<header>
    <img src="foto.jpg" class="logo-header">
    <h1 id="titulo">Cargando...</h1>
</header>

<nav id="tabs">
    <a href="#" data-seccion="actualidad" class="tab-activa">Actualidad</a>
    <a href="#" data-seccion="historias.pdf">Historias</a>
    <a href="#" data-seccion="hobbies.pdf">Hobbies</a>
</nav>

<main id="contenedor"></main>

</div>

<script type="module">
import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/5.4.149/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/5.4.149/pdf.worker.min.mjs';

const contenedor = document.getElementById('contenedor');

const escapeHTML = (str = '') =>
    str.replace(/[&<>"']/g, m => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        '"':'&quot;',
        "'":'&#039;'
    }[m]));

async function cargarTitulo() {
    try {
        const res = await fetch('titulo.txt');
        document.getElementById('titulo').innerText =
            res.ok ? await res.text() : "El rincón de David";
    } catch {
        document.getElementById('titulo').innerText = "El rincón de David";
    }
}

async function renderizarPDF(url, destino) {
    destino.innerHTML = '<div class="loader">Cargando PDF...</div>';

    try {
        const pdf = await pdfjsLib.getDocument(url).promise;
        destino.innerHTML = '';

        const tareas = [];

        for (let i = 1; i <= pdf.numPages; i++) {
            tareas.push((async () => {
                const page = await pdf.getPage(i);
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                destino.appendChild(canvas);

                const viewport = page.getViewport({ scale: 1.5 });

                canvas.height = viewport.height;
                canvas.width = viewport.width;

                await page.render({ canvasContext: ctx, viewport }).promise;
            })());
        }

        await Promise.all(tareas);

    } catch (e) {
        console.error(e);
        destino.innerHTML = `<p>Error al cargar PDF</p>`;
    }
}

async function cargarActualidad() {
    contenedor.innerHTML = '<div class="loader">Cargando...</div>';

    try {
        const res = await fetch('actualidad.json');
        let lista = await res.json();

        lista.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

        contenedor.innerHTML = '';

        for (const item of lista) {

            const { titulo, archivo, fecha, descripcion } = item;

            const card = document.createElement('div');
            card.className = 'pdf-card colapsado';

            card.innerHTML = `
                <div class="info-pdf">
                    <div>
                        <div class="titulo-archivo">${titulo}</div>
                        <div style="font-size:11px;opacity:0.6;">
                            ${new Date(fecha).toLocaleString('es-ES', {
                                day: 'numeric',
                                month: 'long',
                                year: 'numeric',
                                hour: '2-digit',
                                minute: '2-digit'
                            })}
                        </div>
                    </div>
                    <button class="btn-leer-mas">Leer</button>
                </div>

                <div class="descripcion">${escapeHTML(descripcion || '')}</div>

                <div class="visor-pdf"></div>
            `;

            contenedor.appendChild(card);

            const visor = card.querySelector('.visor-pdf');
            const btn = card.querySelector('.btn-leer-mas');

            let cargado = false;

            btn.onclick = async () => {

                const abierto = card.classList.contains('expandido');

                document.querySelectorAll('.pdf-card.expandido').forEach(c => {
                    c.classList.replace('expandido', 'colapsado');
                    c.querySelector('button').innerText = 'Leer';
                });

                if (!abierto) {

                    btn.disabled = true;
                    btn.innerText = 'Cargando...';

                    card.classList.replace('colapsado', 'expandido');

                    if (!cargado) {
                        await renderizarPDF(archivo, visor);
                        cargado = true;
                    }

                    btn.disabled = false;
                    btn.innerText = 'Cerrar';

                    setTimeout(() => {
                        card.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 50);

                } else {
                    card.classList.replace('expandido', 'colapsado');
                    btn.innerText = 'Leer';
                }
            };
        }
	}
    catch (e) {
		console.error("ERROR DETALLADO:", e);
		contenedor.innerHTML = `
        <div style="padding:10px;color:red;">
            <b>Error cargando contenido</b><br><br>
            ${e}
        </div>
    `;
	}
}

async function cargarSeccionUnica(url) {
    contenedor.innerHTML = '<div class="loader">Cargando...</div>';
    const div = document.createElement('div');
    contenedor.innerHTML = '';
    contenedor.appendChild(div);
    renderizarPDF(url, div);
}

document.querySelectorAll('#tabs a').forEach(tab => {
    tab.addEventListener('click', e => {
        e.preventDefault();

        document.querySelectorAll('#tabs a')
            .forEach(t => t.classList.remove('tab-activa'));

        tab.classList.add('tab-activa');

        const seccion = tab.dataset.seccion;

        seccion === 'actualidad'
            ? cargarActualidad()
            : cargarSeccionUnica(seccion);
    });
});

cargarTitulo();
cargarActualidad();
</script>

</body>
</html>
