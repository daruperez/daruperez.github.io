<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rincón de Deivid</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 5px;
    display: flex;
    justify-content: center;
    background: #f4f4f4;
}

.contenedor-principal {
    width: 100%;
    max-width: 800px;
    background: #fff;
    border: 2px solid #000;
    display: flex;
    flex-direction: column;
    box-shadow: 10px 10px 0px #000;
}

header {
    height: 80px;
    display: flex;
    align-items: center;
    border-bottom: 2px solid #000;
    font-size: clamp(20px,5vw,35px);
    font-weight: bold;
    gap: 15px;
    padding: 0 15px;
	position: sticky;
    top: 0;
    z-index: 1000;
    background: white;
}

.logo-header { height: 50px; }

h1 { margin: 0; font-size: inherit; }

.contacto {
    font-size: 12px;
    margin-left: auto;
    color: #000;
    text-decoration: none;
}

nav {
    display: flex;
    border-bottom: 2px solid #000;
	position: sticky;
    top: 80px; /* altura del header */
    z-index: 999;
    background: white;
}

nav a {
    flex: 1;
    text-align: center;
    padding: 10px;
    text-decoration: none;
    color: black;
    border-right: 2px solid #000;
}

.tab-activa {
    background: black;
    color: white;
}

main {
    padding: 15px;
    background: #eee;
    min-height: 80vh;
}

.pdf-card {
    border: 2px solid #000;
    margin-bottom: 20px;
    background: white;
    overflow: hidden;
    transition: transform .25s ease, box-shadow .25s ease;
}

.pdf-card:hover {
    transform: translate(-3px,-3px);
    box-shadow: 13px 13px 0px #000;
}

.pdf-card.expandido {
    box-shadow: 15px 15px 0px #000;
}

.pdf-card.colapsado {
    max-height: 200px;
}

.pdf-card.colapsado .descripcion {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.pdf-card.preview .visor-pdf {
    display: block !important;
    max-height: 120px;
    overflow: hidden;
    position: relative;
}

.pdf-card.preview .visor-pdf::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 40px;
    background: linear-gradient(to bottom, transparent, white);
}

.info-pdf {
    padding: 10px;
    border-bottom: 2px solid #000;
    display: flex;
    justify-content: space-between;
}

.visor-pdf {
    width: 100%;
    display: none;
}

.titulo-archivo {
    font-weight: bold;
}

.descripcion {
    padding: 10px;
    font-size: 13px;
    color: #333;
}

.btn-leer-mas {
    background: black;
    color: white;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
}

.loader {
    padding: 20px;
    text-align: center;
}

canvas {
    width: 100% !important;
    display: block;
}
.miniatura {
    width: 25px;
    height: 30px;
    border: 2px solid #000;
    overflow: hidden;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
}

.thumb-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.thumb-video {
    position: relative;
    width: 100%;
    height: 100%;
}

.play {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 18px;
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 4px 8px;
    border-radius: 4px;
}
</style>
</head>

<body>

<div class="contenedor-principal">

<header>
    <img src="foto.jpg" class="logo-header" alt="Logo">
    <h1 id="titulo">El rincón de Deivid</h1>
    <a href="mailto:daruperez@gmail.com" class="contacto">Contacto</a>
</header>

<nav id="tabs">
    <a href="#" data-seccion="actualidad" class="tab-activa">Actualidad</a>
    <a href="#" data-seccion="historias">Historias</a>
    <a href="#" data-seccion="hobbies">Hobbies</a>
</nav>

<main id="contenedor"></main>

</div>

<script type="module">
	import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/5.4.149/pdf.min.mjs';

	pdfjsLib.GlobalWorkerOptions.workerSrc =
	'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/5.4.149/pdf.worker.min.mjs';

	const contenedor = document.getElementById('contenedor');
	let cardAbierta = null;

	const BTN = {
		open: '▶ Abrir',
		close: '✖ Cerrar'
	};

	const cacheSecciones = {};
	const pdfThumbCache = new Map();
	const videoThumbCache = new Map();

	const ICONOS = {
		pdf: "📄",
		audio: "🎵",
		video: "🎬",
		image: "🖼️",
		link: "🔗",
		other: "📦"
	};

	/* =========================
	   OBSERVER
	========================= */
	const observerPrefetch = new IntersectionObserver(async (entries) => {
		for (const entry of entries) {
			if (!entry.isIntersecting) continue;

			const el = entry.target;

			if (el.dataset.loaded) continue;
			el.dataset.loaded = "1";

			const { tipo, archivo, miniatura } = el.__data;

			if (tipo === 'image') {
				miniatura.innerHTML = `<img src="${archivo}" class="thumb-img">`;
			}

			if (tipo === 'pdf') {
				generarMiniaturaPDF(archivo).then(src => {
					if (src) {
						miniatura.innerHTML = `<img src="${src}" class="thumb-img">`;
					}
				});
			}

			if (tipo === 'video') {
				generarMiniaturaVideo(archivo).then(src => {
					if (src) {
						miniatura.innerHTML = `
							<div class="thumb-video">
								<img src="${src}" class="thumb-img">
								<div class="play">▶</div>
							</div>
						`;
					} else {
						miniatura.innerHTML = "🎬";
					}
				});
			}

			observerPrefetch.unobserve(el);
		}
	}, { threshold: 0.2 });

	/* =========================
	   UTIL
	========================= */
	function getFileType(file) {
		if (/^https?:\/\//i.test(file)) return 'link';

		const ext = file.split('?')[0].split('.').pop().toLowerCase();

		if (ext === 'pdf') return 'pdf';
		if (['mp3','wav','ogg'].includes(ext)) return 'audio';
		if (['mp4','webm','avi'].includes(ext)) return 'video';
		if (['jpg','jpeg','png','webp','gif','svg'].includes(ext)) return 'image';

		return 'other';
	}

	/* =========================
	   MINIATURA PDF
	========================= */
	async function generarMiniaturaPDF(url) {

		if (pdfThumbCache.has(url)) return pdfThumbCache.get(url);

		try {
			const pdf = await pdfjsLib.getDocument(url).promise;
			const page = await pdf.getPage(1);

			const viewport = page.getViewport({ scale: 0.3 });

			const canvas = document.createElement('canvas');
			const ctx = canvas.getContext('2d');

			canvas.width = viewport.width;
			canvas.height = viewport.height;

			await page.render({ canvasContext: ctx, viewport }).promise;

			const dataUrl = canvas.toDataURL();
			pdfThumbCache.set(url, dataUrl);

			return dataUrl;

		} catch {
			return null;
		}
	}

	/* =========================
	   MINIATURA VIDEO
	========================= */
	async function generarMiniaturaVideo(url) {

		if (videoThumbCache.has(url)) return videoThumbCache.get(url);

		return new Promise((resolve) => {

			const video = document.createElement('video');

			video.src = url;
			video.crossOrigin = "anonymous";
			video.muted = true;
			video.playsInline = true;

			video.addEventListener('loadeddata', () => {
				video.currentTime = 1;
			});

			video.addEventListener('seeked', () => {
				try {
					const canvas = document.createElement('canvas');
					const ctx = canvas.getContext('2d');

					canvas.width = video.videoWidth;
					canvas.height = video.videoHeight;

					ctx.drawImage(video, 0, 0);

					const dataUrl = canvas.toDataURL();
					videoThumbCache.set(url, dataUrl);

					resolve(dataUrl);

				} catch {
					resolve(null);
				}
			});

			video.addEventListener('error', () => resolve(null));
		});
	}

	/* =========================
	   CONTENIDO
	========================= */
	async function cargarContenido(tipo, archivo, visor) {

		if (tipo === 'pdf') {
			const pdf = await pdfjsLib.getDocument(archivo).promise;
			visor.innerHTML = '';

			const page = await pdf.getPage(1);
			const canvas = document.createElement('canvas');
			const ctx = canvas.getContext('2d');

			visor.appendChild(canvas);

			const viewport = page.getViewport({ scale: 1.2 });

			canvas.height = viewport.height;
			canvas.width = viewport.width;

			await page.render({ canvasContext: ctx, viewport }).promise;
		}
		else if (tipo === 'audio') {
			visor.innerHTML = `<audio controls style="width:100%"><source src="${archivo}"></audio>`;
		}
		else if (tipo === 'video') {
			visor.innerHTML = `<video controls style="width:100%"><source src="${archivo}"></video>`;
		}
		else if (tipo === 'image') {
			visor.innerHTML = `<img src="${archivo}" style="width:100%">`;
		}
		else {
			visor.innerHTML = `<a href="${archivo}" target="_blank">Abrir</a>`;
		}
	}

	/* =========================
	   CARD
	========================= */
	function crearCard(item) {

		const { titulo, archivo, fecha, descripcion } = item;
		const tipo = getFileType(archivo);

		const card = document.createElement('div');
		card.className = 'pdf-card colapsado';

		const visor = document.createElement('div');
		visor.className = 'visor-pdf';

		const miniatura = document.createElement('div');
		miniatura.className = 'miniatura';
		miniatura.innerHTML = ICONOS[tipo];

		card.__data = { tipo, archivo, miniatura };

		card.innerHTML = `
			<div class="info-pdf">
				<div style="display:flex;align-items:center;gap:10px;">
					<div class="miniatura-container"></div>
					<div>
						<div class="titulo-archivo">${titulo}</div>
						<div style="font-size:11px;opacity:0.6;">
							${new Date(fecha).toLocaleString('es-ES')}
						</div>
					</div>
				</div>
				<button class="btn-leer-mas">${BTN.open}</button>
			</div>
		`;

		card.querySelector('.miniatura-container').appendChild(miniatura);

		const desc = document.createElement('div');
		desc.className = 'descripcion';
		desc.textContent = descripcion || '';

		card.appendChild(desc);
		card.appendChild(visor);

		const btn = card.querySelector('button');

		btn.onclick = async () => {

			if (cardAbierta && cardAbierta !== card) {
				const visorPrev = cardAbierta.querySelector('.visor-pdf');
				visorPrev.innerHTML = '';
				cardAbierta.classList.remove('expandido');
				cardAbierta.classList.add('colapsado');
				cardAbierta.querySelector('button').innerText = BTN.open;
			}

			const abierto = card.classList.contains('expandido');

			if (!abierto) {
				card.classList.add('expandido');
				card.classList.remove('colapsado');
				btn.innerText = BTN.close;
				visor.style.display = 'block';

				await cargarContenido(tipo, archivo, visor);

				cardAbierta = card;

			} else {
				card.classList.remove('expandido');
				card.classList.add('colapsado');
				btn.innerText = BTN.open;
				visor.style.display = 'none';
				visor.innerHTML = '';
				cardAbierta = null;
			}
		};

		observerPrefetch.observe(card);

		return card;
	}

	/* =========================
	   LISTA
	========================= */
	function renderizarLista(lista) {
		contenedor.innerHTML = '';
		lista.map(crearCard).forEach(c => contenedor.appendChild(c));
	}

	/* =========================
	   SECCIONES
	========================= */
	async function cargarSeccion(nombre) {

		if (cacheSecciones[nombre]) {
			renderizarLista(cacheSecciones[nombre]);
			return;
		}

		contenedor.innerHTML = '<div class="loader">Cargando...</div>';

		const res = await fetch(`${nombre}.json`);
		const lista = res.ok ? await res.json() : [];

		lista.sort((a,b) => new Date(b.fecha) - new Date(a.fecha));

		cacheSecciones[nombre] = lista;

		renderizarLista(lista);
	}

	/* =========================
	   INIT
	========================= */
	document.querySelectorAll('#tabs a').forEach(tab => {
		tab.addEventListener('click', e => {
			e.preventDefault();

			document.querySelectorAll('#tabs a').forEach(t => t.classList.remove('tab-activa'));
			tab.classList.add('tab-activa');

			cargarSeccion(tab.dataset.seccion);
		});
	});

	/* =========================
	   TITULO
	========================= */
	async function cargarTitulo() {
		try {
			const res = await fetch('titulo.txt');
			document.getElementById('titulo').textContent =
				res.ok ? await res.text() : "El rincón de David";
		} catch {
			document.getElementById('titulo').textContent = "El rincón de David";
		}
	}
	cargarTitulo();
	cargarSeccion('actualidad');

</script>

</body>
</html>
