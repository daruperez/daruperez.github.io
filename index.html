<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rinc&oacute;n de David PRO</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 5px;
    display: flex;
    justify-content: center;
    background-color: #f4f4f4;
}

.contenedor-principal {
    width: 100%;
    max-width: 800px;
    background-color: #fff;
    border: 2px solid #000;
    display: flex;
    flex-direction: column;
    box-shadow: 10px 10px 0px #000;
}

header {
	height: 80px;
    display: flex;
    align-items: center;
    border-bottom: 2px solid #000;
    font-size: clamp(20px, 5vw, 35px);
    font-weight: bold;
    gap: 15px;
    padding: 0 15px;
}
.logo-header { height: 50px; width: auto; object-fit: contain; }

nav {
    display: flex;
    border-bottom: 2px solid #000;
}

nav a {
    flex: 1;
    padding: 10px;
    text-align: center;
    text-decoration: none;
    color: #000;
    border-right: 2px solid #000;
}

nav a.tab-activa {
    background: #000;
    color: #fff;
}

main {
    height: calc(100dvh - 150px);
    overflow-y: auto;
    background: #eee;
}

canvas {
    width: 100%;
    border: 2px solid #000;
    margin-bottom: 10px;
}

.loader {
    padding: 20px;
    text-align: center;
    font-weight: bold;
}

</style>
</head>

<body>
<div class="contenedor-principal">

<header>
	<img src="foto.jpg" alt="Logo" class="logo-header">
	<h1 style="margin: 0; font-size: inherit;" id="titulo">Cargando...</h1>
	<a href="mailto:darupere@gmail.com">Contacto</a>
</header>

<nav id="tabs">
<a href="#" data-pdf="actualidad.pdf" class="tab-activa">ACTUALIDAD</a>
<a href="#" data-pdf="historias.pdf">HISTORIAS</a>
<a href="#" data-pdf="hobbies.pdf">HOBBIES</a>
</nav>

<main id="contenedor"></main>

</div>

<script type="module">
import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/5.4.149/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/5.4.149/pdf.worker.min.mjs';

const contenedor = document.getElementById('contenedor');
let pdfDoc = null;
let paginaActual = 1;
let cargando = false;

async function cargarTitulo() {
    try {
        const res = await fetch('titulo.txt');
        document.getElementById('titulo').innerText = await res.text();
    } catch {
        document.getElementById('titulo').innerText = "El rincon de David";
    }
}

async function cargarPDF(url) {
    contenedor.innerHTML = '<div class="loader">Cargando...</div>';
    paginaActual = 1;

    pdfDoc = await pdfjsLib.getDocument(url).promise;

    contenedor.innerHTML = '';
    cargarSiguientePagina();
}

async function cargarSiguientePagina() {
    if (!pdfDoc || cargando || paginaActual > pdfDoc.numPages) return;

    cargando = true;

    const page = await pdfDoc.getPage(paginaActual);
    const canvas = document.createElement('canvas');
    const context = canvas.getContext('2d');

    contenedor.appendChild(canvas);

    const viewportBase = page.getViewport({ scale: 1 });
    const escala = (contenedor.clientWidth * 0.98) / viewportBase.width;
    const dpr = window.devicePixelRatio || 1;
    const viewport = page.getViewport({ scale: escala * dpr });

    canvas.width = viewport.width;
    canvas.height = viewport.height;
    canvas.style.width = (viewport.width / dpr) + 'px';
    canvas.style.height = (viewport.height / dpr) + 'px';

    await page.render({ canvasContext: context, viewport }).promise;

    paginaActual++;
    cargando = false;
}

// Scroll infinito
contenedor.addEventListener('scroll', () => {
    if (contenedor.scrollTop + contenedor.clientHeight >= contenedor.scrollHeight - 200) {
        cargarSiguientePagina();
    }
});

// Tabs
const tabs = document.querySelectorAll('#tabs a');
tabs.forEach(tab => {
    tab.addEventListener('click', e => {
        e.preventDefault();
        tabs.forEach(t => t.classList.remove('tab-activa'));
        tab.classList.add('tab-activa');
        cargarPDF(tab.dataset.pdf);
    });
});

// Zoom con gesto
let escalaExtra = 1;
contenedor.addEventListener('wheel', (e) => {
    if (e.ctrlKey) {
        e.preventDefault();
        escalaExtra += e.deltaY * -0.001;
        escalaExtra = Math.min(Math.max(0.5, escalaExtra), 3);
        contenedor.style.transform = `scale(${escalaExtra})`;
    }
}, { passive: false });

cargarTitulo();
cargarPDF('actualidad.pdf');

</script>

</body>
</html>
