<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rincón de Deivid</title>

<style>
/* VARIABLES GLOBALES: Controla el diseño desde aquí */
:root {
    --borde: 2px solid #000;
    --sombra: 10px 10px 0px #000;
    --sombra-hover: 13px 13px 0px #000;
    --bg-main: #e0e0e0;
    --bg-card: #ffffff;
    --acento: #ffff00; /* Amarillo Neobrutalista */
}

body {
    font-family: 'Inter', Arial, sans-serif;
    margin: 0;
    padding: 10px;
    display: flex;
    justify-content: center;
    background: #f0f0f0;
}

/* CONTENEDOR PRINCIPAL */
.contenedor-principal {
    width: 100%;
    max-width: 800px;
    background: #fff;
    border: var(--borde);
    display: flex;
    flex-direction: column;
    box-shadow: var(--sombra);
}

/* HEADER */
header {
    height: 80px;
    display: flex;
    align-items: center;
    border-bottom: var(--borde);
    font-size: clamp(18px, 5vw, 32px);
    font-weight: 900;
    gap: 15px;
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 1000;
    background: #fff;
}

.logo-header { 
    height: 50px; 
    border: 2px solid #000;
}

.contacto {
    font-size: 12px;
    margin-left: auto;
    color: #000;
    text-decoration: underline;
    font-weight: bold;
}

/* NAVEGACIÓN */
nav {
    display: flex;
    border-bottom: var(--borde);
    position: sticky;
    top: 80px; 
    z-index: 999;
    background: #fff;
}

nav a {
    flex: 1;
    text-align: center;
    padding: 12px;
    text-decoration: none;
    color: #000;
    font-weight: bold;
    border-right: var(--borde);
    transition: background 0.2s;
}

nav a:last-child { border-right: none; }

.tab-activa {
    background: #000;
    color: #fff;
}

/* ÁREA DE CONTENIDO */
main {
    padding: 20px;
    background: var(--bg-main);
    min-height: 80vh;
}

/* Integración total cuando hay un solo visor abierto */
main:has(> .visor-pdf), 
main:has(> div:only-child) {
    padding: 0;
    background: #fff;
}

/* TARJETAS (CARDS) */
.pdf-card {
    border: var(--borde);
    margin-bottom: 25px;
    background: var(--bg-card);
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.pdf-card:hover {
    transform: translate(-4px, -4px);
    box-shadow: var(--sombra-hover);
}

.pdf-card.expandido {
    transform: none;
    box-shadow: 15px 15px 0px #000;
}

.info-pdf {
    padding: 12px 15px;
    border-bottom: var(--borde);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fff;
}

.titulo-archivo {
    font-weight: 800;
    font-size: 16px;
    text-transform: uppercase;
}

.descripcion {
    padding: 15px;
    font-size: 14px;
    color: #333;
    line-height: 1.6;
}

/* MINIATURAS */
.miniatura {
    width: 35px;
    height: 45px;
    border: var(--borde);
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 2px 2px 0px #000;
}

.thumb-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* VISOR PDF (PAPEL INFINITO) */
.visor-pdf {
    width: 100%;
    line-height: 0; /* Elimina espacios entre canvas */
    display: none;
    background: #fff;
}

canvas {
    width: 100% !important;
    height: auto !important;
    display: block; /* Elimina espacio inferior */
    margin: 0;
    padding: 0;
    border: none;
}

/* BOTONES */
.btn-leer-mas {
    background: #000;
    color: #fff;
    border: var(--borde);
    padding: 8px 15px;
    cursor: pointer;
    font-weight: bold;
    text-transform: uppercase;
    font-size: 11px;
}

.btn-descarga-estilo {
    display: inline-block;
    margin: 20px 0;
    padding: 12px 25px;
    background: #fff;
    color: #000;
    text-decoration: none;
    font-weight: 900;
    border: var(--borde);
    box-shadow: 5px 5px 0px #000;
    transition: all 0.1s;
}

.btn-descarga-estilo:hover {
    background: var(--acento);
    transform: translate(-2px, -2px);
    box-shadow: 7px 7px 0px #000;
}

.loader {
    padding: 40px;
    text-align: center;
    font-weight: bold;
}

@media (max-width: 600px) {
    body { padding: 0; }
    .contenedor-principal { border: none; }
    header { height: 60px; }
    nav { top: 60px; }
}
</style>
</head>

<body>

<div class="contenedor-principal">

<header>
    <img src="foto.jpg" class="logo-header" alt="Logo">
    <h1 id="titulo">El rincón de Deivid</h1>
    <a href="mailto:daruperez@gmail.com" class="contacto">Contacto</a>
</header>

<nav id="tabs">
    <a href="#" data-seccion="actualidad" class="tab-activa">Actualidad</a>
    <a href="#" data-seccion="historias">Historias</a>
    <a href="#" data-seccion="hobbies">Hobbies</a>
</nav>

<main id="contenedor"></main>

</div>

<script type="module">
	import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/5.4.149/pdf.min.mjs';

	pdfjsLib.GlobalWorkerOptions.workerSrc =
	'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/5.4.149/pdf.worker.min.mjs';

	const MAX_PAGES_VIEWER = 4; // Cambia aquí el límite para toda la web
	const contenedor = document.getElementById('contenedor');
	let cardAbierta = null;

	const BTN = {
		open: '▶ Abrir',
		close: '✖ Cerrar'
	};

	const cacheSecciones = {};
	const pdfThumbCache = new Map();

	/* =========================
	   ICONOS FALLBACK
	========================= */
	const ICONOS = {
		pdf: "📄",
		audio: "🎵",
		video: "🎬",
		image: "🖼️",
		link: "🔗",
		other: "📦"
	};

	/* =========================
	   OBSERVER (prefetch + thumbs)
	========================= */
	const observerPrefetch = new IntersectionObserver(async (entries) => {
		
		for (const entry of entries) {
			if (!entry.isIntersecting) continue;

			const el = entry.target;

			if (el.dataset.loaded) continue;
			el.dataset.loaded = "1";

			const { tipo, archivo, miniatura } = el.__data;
		
			// Prefetch PDF
			if (tipo === 'pdf') {
				//Icono por defecto antes de cargar miniatura real
				miniatura.innerHTML = ICONOS.pdf;
				
				generarMiniaturaPDF(archivo).then(src => {
					if (src) {
						miniatura.innerHTML = `<img src="${src}" class="thumb-img">`;
					}
				});
			}

			// Imagen directa
			if (tipo === 'image') {
				miniatura.innerHTML = `<img src="${archivo}" class="thumb-img">`;
			}

			observerPrefetch.unobserve(el);
		}
	}, { threshold: 0.2 });

	/* =========================
	   UTIL
	========================= */
	function getFileType(file) {
		if (/^https?:\/\//i.test(file)) return 'link';

		const ext = file.split('?')[0].split('.').pop().toLowerCase();

		if (ext === 'pdf') return 'pdf';
		if (['mp3','wav','ogg'].includes(ext)) return 'audio';
		if (['mp4','webm','avi'].includes(ext)) return 'video';
		if (['jpg','jpeg','png','webp','gif','svg'].includes(ext)) return 'image';

		return 'other';
	}

	/* =========================
	   MINIATURA PDF
	========================= */
	async function generarMiniaturaPDF(url) {

		if (pdfThumbCache.has(url)) {
			return pdfThumbCache.get(url);
		}

		try {
			const pdf = await pdfjsLib.getDocument(url).promise;
			// Si es muy largo, no generamos miniatura para ahorrar recursos
			if (pdf.numPages > MAX_PAGES_VIEWER) {
				pdf.destroy();
				return null; 
			}
			
			const page = await pdf.getPage(1);
			const viewport = page.getViewport({ scale: 0.3 });
			const canvas = document.createElement('canvas');
			const ctx = canvas.getContext('2d');

			canvas.width = viewport.width;
			canvas.height = viewport.height;

			await page.render({
				canvasContext: ctx,
				viewport
			}).promise;

			const dataUrl = canvas.toDataURL();
			pdfThumbCache.set(url, dataUrl);
			pdf.destroy();
			return dataUrl;

		} catch (err) {
			console.error(err);
			return null;
		}
	}

	/* =========================
	   TITULO
	========================= */
	async function cargarTitulo() {
		try {
			const res = await fetch('titulo.txt');
			document.getElementById('titulo').textContent =
				res.ok ? await res.text() : "El rincón de David";
		} catch {
			document.getElementById('titulo').textContent = "El rincón de Deivid";
		}
	}

	/* =========================
	   PDF VISOR
	========================= */
async function renderizarPDF(url, destino) {
    destino.innerHTML = '<div class="loader">Cargando documento...</div>';
    try {
        const pdf = await pdfjsLib.getDocument(url).promise;
        destino.innerHTML = ''; // Limpiamos el loader
        //control del número de páginas
		const esExtenso = pdf.numPages > MAX_PAGES_VIEWER;
        // Si es extenso, solo cargamos la primera página, si no, todas.
        const paginasMostradas = esExtenso ? 1 : pdf.numPages;

        for (let i = 1; i <= paginasMostradas; i++) {
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale: 2 }); // Un poco más de calidad
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            destino.appendChild(canvas);
            await page.render({ canvasContext: ctx, viewport }).promise;
        }

        // Si el PDF se cortó por ser extenso, añadimos el aviso y el botón
        if (esExtenso) {
            const aviso = document.createElement('div');
            aviso.style.cssText = `
                padding: 30px 20px; 
                text-align: center; 
                border-top: 2px solid #000; 
                background: #fff;
                margin-top: 10px;
				line-height:1.5;
            `;
            aviso.innerHTML = `
                <p style="margin-bottom:15px; font-weight:bold;">
                    📄 Este documento es extenso (${pdf.numPages} páginas).
                </p>
                <a href="${url}" download class="btn-descarga-estilo">
                    📥 Descargar PDF completo
                </a>
            `;
            destino.appendChild(aviso);
        }

        // 🔥 Liberar memoria del objeto PDF
        pdf.destroy();

    } catch (err) {
        console.error("Error en renderizarPDF:", err);
        destino.innerHTML = `
            <div style="padding:20px; color:red; border:2px solid red; margin:10px;">
                ❌ Error al cargar el PDF. Puede que el archivo no exista o esté dañado.
            </div>`;
    }
}

	/* =========================
	   CONTENIDO
	========================= */
	async function cargarContenido(tipo, archivo, visor) {

		if (tipo === 'pdf') {
			await renderizarPDF(archivo, visor);
		}
		else if (tipo === 'audio') {
			visor.innerHTML = `<audio controls style="width:100%">
				<source src="${archivo}">
			</audio>`;
		}
		else if (tipo === 'video') {
			visor.innerHTML = `<video controls style="width:100%">
				<source src="${archivo}">
			</video>`;
		}
		else if (tipo === 'link') {
			visor.innerHTML = `<a href="${archivo}" target="_blank">Ir al sitio web</a>`;
		}
		else if (tipo === 'image') {
			visor.innerHTML = `<img src="${archivo}" style="width:100%">`;
		}
		else {
			visor.innerHTML = `<a href="${archivo}" target="_blank">Descargar</a>`;
		}
	}

	/* =========================
	   CARD
	========================= */
	function crearCard(item, autoOpen = false) {

		const { titulo, archivo, fecha, descripcion } = item;
		const tipo = getFileType(archivo);

		const card = document.createElement('div');
		card.className = 'pdf-card colapsado';

		const visor = document.createElement('div');
		visor.className = 'visor-pdf';

		const miniatura = document.createElement('div');
		miniatura.className = 'miniatura';
		miniatura.innerHTML = ICONOS[tipo] || ICONOS.other;
	
		

		card.__data = { tipo, archivo, miniatura };

		card.innerHTML = `
			<div class="info-pdf">
				<div style="display:flex;align-items:center;gap:10px;">
					<div class="miniatura-container"></div>
					<div>
						<div class="titulo-archivo">${titulo}</div>
						<div style="font-size:11px;opacity:0.6;">
							${new Date(fecha).toLocaleString('es-ES')}
						</div>
					</div>
				</div>
				<button type="button" class="btn-leer-mas">${BTN.open}</button>
			</div>
		`;

		card.querySelector('.miniatura-container').appendChild(miniatura);

		const desc = document.createElement('div');
		desc.className = 'descripcion';
		desc.textContent = descripcion || '';

		card.appendChild(desc);
		card.appendChild(visor);

		const btn = card.querySelector('button');

		btn.onclick = async () => {

			if (cardAbierta && cardAbierta !== card) {
				const visorPrev = cardAbierta.querySelector('.visor-pdf');
				visorPrev.innerHTML = ''; // 🔥 limpiar memoria

				cardAbierta.classList.remove('expandido');
				cardAbierta.classList.add('colapsado');
				cardAbierta.querySelector('button').innerText = BTN.open;
			}

			const abierto = card.classList.contains('expandido');

			if (!abierto) {

				card.classList.remove('colapsado');
				card.classList.add('expandido');

				btn.innerText = BTN.close;
				visor.style.display = 'block';

				await cargarContenido(tipo, archivo, visor);

				cardAbierta = card;

			} else {
				card.classList.remove('expandido');
				card.classList.add('colapsado');

				btn.innerText = BTN.open;
				visor.style.display = 'none';
				visor.innerHTML = ''; // 🔥 limpiar

				cardAbierta = null;
			}
		};

		observerPrefetch.observe(card);

		return card;
	}

	/* =========================
	   LISTA
	========================= */
	function renderizarLista(lista) {
		contenedor.innerHTML = '';
		cardAbierta = null;
		
		// 🔥 CASO ESPECIAL: solo un archivo
		if (lista.length === 1) {
			const item = lista[0];
			const tipo = getFileType(item.archivo);

			const visor = document.createElement('div');
			visor.style.width = '100%';

			contenedor.appendChild(visor);

			cargarContenido(tipo, item.archivo, visor);

			return;
		}
		
		// comportamiento normal
		lista.map(crearCard).forEach(c => contenedor.appendChild(c));
	}

	/* =========================
	   SECCIONES
	========================= */
	async function cargarSeccion(nombre) {

		if (cacheSecciones[nombre]) {
			renderizarLista(cacheSecciones[nombre]);
			return;
		}

		contenedor.innerHTML = '<div class="loader">Cargando...</div>';

		const res = await fetch(`${nombre}.json`);
		const lista = res.ok ? await res.json() : [];
		
		//en caso de que el json no exista
		if (lista.length === 0) {
			contenedor.innerHTML = '<p style="padding:20px;">Próximamente habrá contenido aquí.</p>';
		return;
		}

		lista.sort((a,b) => new Date(b.fecha) - new Date(a.fecha));

		cacheSecciones[nombre] = lista;

		renderizarLista(lista);
	}

	/* =========================
	   INIT
	========================= */
	document.querySelectorAll('#tabs a').forEach(tab => {
		tab.addEventListener('click', e => {
			e.preventDefault();

			document.querySelectorAll('#tabs a').forEach(t => t.classList.remove('tab-activa'));
			tab.classList.add('tab-activa');

			cargarSeccion(tab.dataset.seccion);
		});
	});

	cargarTitulo();
	cargarSeccion('actualidad');

</script>

</body>
</html>
