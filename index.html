<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi P&aacute;gina Web</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .contenedor-principal {
            width: 100%;
            max-width: 800px;
            border: 2px solid #000;
        }

        header {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid #000;
            font-size: clamp(24px, 5vw, 40px);
            font-weight: bold;
        }

        nav {
            display: flex;
            border-bottom: 2px solid #000;
        }

		nav a {
			flex: 1;
            padding: 15px 5px;
            text-align: center;
            text-decoration: underline;
            color: #333; /* Un gris muy oscuro en lugar de negro puro queda mÃs elegante */
            font-weight: bold;
            border-right: 2px solid #000;
            font-size: 14px;
            transition: all 0.3s ease; /* Suaviza el cambio de color */
        }

        nav a:last-child {
            border-right: none;
        }

        nav a:hover {
            background-color: #000; /* Fondo negro al pasar el ratµn */
            color: #fff;            /* Texto blanco */
            text-decoration: underline;
        }
        
        /* Efecto cuando haces clic */
        nav a:active {
            background-color: #444;
        }

        main {
            padding: 30px;
            display: flex;
            gap: 20px;
            min-height: 300px;
        }

        .caja-imagen {
            width: 120px;
            height: 120px;
            border: 2px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .texto-contenido {
		line-height: 1.4; /* Mejora el espacio entre lÚneas */
		word-break: break-word; /* Evita que palabras muy largas rompan el diseþo */
		}

		@media (max-width: 600px) {
			main {
				flex-direction: column; /* La imagen y el texto se apilan uno sobre otro */
				align-items: center;
				text-align: center;
			}
			nav {
				flex-wrap: wrap; /* Permite que los botones del menº bajen si no caben */
			}
			nav a {
				border-bottom: 1px solid #000;
				border-right: none; /* sin borde */
				flex: 1 0 100%;    /* Y esto para que cada botµn ocupe toda la fila */
			}
		}
		
		.sticky-top {
			position: sticky;
			top: 0;
			z-index: 1000;      /* Para que pase por encima del texto al hacer scroll */
			background-color: #fff; /* Evita que el contenido de abajo se transparente */
		}
    </style>
</head>
<body>

    <div class="contenedor-principal">
		<!-- Contenedor para fijar header y nav -->
        <div class="sticky-top">
			<header>
				<h1 style="margin: 0; font-size: inherit;" id="titulo-dinamico" class="texto-titulo">
					Cargando contenido...
				</h1>
			</header>

			<nav>
				<!-- Enlace a Correo -->
				<a href="mailto:prueba@gmail.com">CONTACTO</a>

				<!-- Enlace a Facebook (puedes aþadir el tuyo luego) -->
				<a href="https://facebook.com/" target="_blank" rel="noopener noreferrer">FACEBOOK</a>
             
				<!-- Enlace a tu cuenta de X (se abre en pestaþa nueva) -->
				<a href="https://x.com/" target="_blank" rel="noopener noreferrer">X</a>
			</nav>
		</div>

        <main>
            <div class="caja-imagen">
			        <img src="imagen.jpg" alt="Imagen principal" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
			<div id="texto-dinamico" class="texto-contenido">
				Cargando contenido...
			</div>
            
        </main>
    </div>
	
<script>
    const cuerpoContenido = document.getElementById('texto-dinamico');
    const tituloHeader = document.getElementById('titulo-dinamico');

    async function cargarDatos() {
        try {
            // Lanzamos ambas peticiones al mismo tiempo
            const [resContenido, resTitulo] = await Promise.all([
                fetch('contenido.txt'),
                fetch('titulo.txt')
            ]);

            if (resContenido.ok) {
                cuerpoContenido.innerText = await resContenido.text();
            }

            if (resTitulo.ok) {
                tituloHeader.innerText = await resTitulo.text();
            } else {
                tituloHeader.innerText = "Mi PÃgina Web";
            }
        } catch (error) {
            console.error('Error general:', error);
            cuerpoContenido.innerHTML = "<span style='color: red; font-size: 16px;'>Error al conectar con el servidor.</span>";
        }
    }

    cargarDatos();
</script>

</body>

</html>
