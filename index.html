<!DOCTYPE html>
<html lang="es">
<head>
	<!-- 
      PROYECTO: Web Profesional - Dr. Jesºs Ruiz
      DISEîO: Minimalismo Brutalista (Bordes 2px, Sombras Sµlidas)
      VISOR: PDF.js v5 con renderizado HiDPI para mÃxima nitidez en mµviles
      DESARROLLADO POR: David Ruiz Y EN COLABORACIÆN CON: Gemini (IA de Google)
      FECHA: Abril de 2026
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Jes&uacute;s Ruiz</title>
    <style>
         /* CONFIGURACIÆN GENERAL */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px; /* Reducido de 20px a 10px para ganar aire en los lados */
            display: flex;
            justify-content: center;
            background-color: #f4f4f4;
        }

        .contenedor-principal {
            width: 100%;
            max-width: 800px;
            background-color: #fff;
            border: 2px solid #000;
            display: flex;
            flex-direction: column;
            box-shadow: 10px 10px 0px #000;
        }

        header {
            height: 80px;
            display: flex;
            align-items: center;
            border-bottom: 2px solid #000;
            font-size: clamp(20px, 5vw, 35px);
            font-weight: bold;
            gap: 15px;
            padding: 0 15px;
        }

        .logo-header { height: 50px; width: auto; object-fit: contain; }

        nav { display: flex; border-bottom: 2px solid #000; background-color: #fff; }
        nav a {
            flex: 1;
            padding: 15px 5px;
            text-align: center;
            text-decoration: underline;
            color: #333;
            font-weight: bold;
            border-right: 2px solid #000;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        nav a:last-child { border-right: none; }
        nav a:hover { background-color: #000; color: #fff; }

        /* AJUSTE PARA PDF.JS AL LëMITE */
        main {
            padding: 5px 0; /* Espacio mÚnimo arriba y abajo */
            height: 85vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center; 
            background-color: #eee;
            width: 100%; /* Asegura que use todo el ancho del contenedor */
        }

        canvas {
            max-width: 100%; /* Permitimos que llegue al borde total */
            height: auto !important;
            image-rendering: -webkit-optimize-contrast;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
            background-color: white;
        }

        @media (max-width: 600px) {
            body { padding: 5px; } /* En mµviles, casi sin margen exterior */
            header { height: auto; padding: 10px; }
            nav { flex-wrap: wrap; }
            main { height: 75vh; }
        }

        .sticky-top { position: sticky; top: 0; z-index: 1000; background-color: #fff; }

    </style>
</head>
<body>

    <div class="contenedor-principal">
        <div class="sticky-top">
            <header>
                <img src="foto.jpg" alt="Logo" class="logo-header">
                <h1 style="margin: 0; font-size: inherit;" id="titulo-dinamico">Cargando tÚtulo...</h1>
            </header>
            
            <nav>
                <a href="mailto:drjesusruiz@drjesusruizperito.com">CONTACTO</a>
                <a href="https://www.threads.com/@dr.ruiz_medicina_legal" target="_blank" rel="noopener">INSTAGRAM</a>
                <a href="https://es.linkedin.com/in/dr-jes%C3%BAs-ruiz-2171a5195" target="_blank" rel="noopener">LINKEDIN</a>
            </nav>
        </div>

        <main id="contenedor-pdf">
            <canvas id="visor-pdf"></canvas>
        </main>
    </div>

    <script type="module">
        import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/5.4.149/pdf.min.mjs';
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/5.4.149/pdf.worker.min.mjs';

        const tituloHeader = document.getElementById('titulo-dinamico');

        async function cargarTitulo() {
            try {
                const respuesta = await fetch('titulo.txt');
                if (respuesta.ok) {
                    const texto = await respuesta.text();
                    tituloHeader.innerText = texto.trim();
                } else {
                    tituloHeader.innerText = "Dr. Jesus Ruiz";
                }
            } catch (e) {
                tituloHeader.innerText = "Dr. Jesus Ruiz";
            }
        }

        async function cargarPDF() {
            const url = 'contenido.pdf';
            try {
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;
                const page = await pdf.getPage(1);
                
                const canvas = document.getElementById('visor-pdf');
                const context = canvas.getContext('2d');

                // 1. Calculamos la escala base para el ancho del contenedor
                const contenedorWidth = document.getElementById('contenedor-pdf').clientWidth;
                const viewportOriginal = page.getViewport({ scale: 1 });
                const escalaBase = (contenedorWidth * 0.99) / viewportOriginal.width;

                // 2. DETECTAMOS LA CALIDAD DE LA PANTALLA (Mµvil vs PC)
                // Esto multiplica los pÚxeles para que se vea nÚtido (Retina)
                const dpr = window.devicePixelRatio || 1;
                const viewport = page.getViewport({ scale: escalaBase * dpr });

                // 3. Ajustamos el tamaþo interno del Canvas (Alta resoluciµn)
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                // 4. Ajustamos el tamaþo visual del Canvas (Tamaþo normal en CSS)
                canvas.style.width = (viewport.width / dpr) + 'px';
                canvas.style.height = (viewport.height / dpr) + 'px';

                // 5. Dibujamos con la escala de alta densidad
                await page.render({
                    canvasContext: context,
                    viewport: viewport
                }).promise;

            } catch (error) {
                console.error("Error:", error);
                document.getElementById('contenedor-pdf').innerHTML = 
                    `<p style="padding:20px">Error al cargar PDF. <a href="contenido.pdf">Descargar</a></p>`;
            }
        }

        cargarTitulo();
        cargarPDF();
    </script>
</body>
</html>
