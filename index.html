<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi P&aacute;gina Web</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .contenedor-principal {
            width: 100%;
            max-width: 800px;
            border: 2px solid #000;
            display: flex;
            flex-direction: column;
        }

		header {
			height: 80px;
			display: flex;
			align-items: center;
			justify-content: flex-start;
			border-bottom: 2px solid #000;
			font-size: clamp(20px, 5vw, 40px);
			font-weight: bold;
			gap: 15px;
			padding: 0 15px;
		}

		.logo-header {
			height: 50px;
			width: auto;
			object-fit: contain;
		}

        nav {
            display: flex;
            border-bottom: 2px solid #000;
        }

		nav a {
			flex: 1;
            padding: 15px 5px;
            text-align: center;
            text-decoration: underline;
            color: #333;
            font-weight: bold;
            border-right: 2px solid #000;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        nav a:last-child {
            border-right: none;
        }

        nav a:hover {
            background-color: #000;
            color: #fff;
        }

        /* Ajuste para que el PDF se vea bien */
        main {
            padding: 0;
            height: 80vh; /* Altura del visor de PDF */
            display: block; /* Cambiado de flex para el iframe */
        }

		@media (max-width: 600px) {
			.logo-header { height: 35px; }
			header { height: auto; padding: 10px; }
			nav { flex-wrap: wrap; }
            main { height: 60vh; } /* Un poco más pequeńo en móviles */
		}
		
		.sticky-top {
			position: sticky;
			top: 0;
			z-index: 1000;
			background-color: #fff;
		}
    </style>
</head>
<body>
    <div class="contenedor-principal">
        <div class="sticky-top">
            <header>
				<img src="foto.jpg" alt="Logo" class="logo-header">
                <h1 style="margin: 0; font-size: inherit;" id="titulo-dinamico" class="texto-titulo">
                    Mi web...
                </h1>
            </header>
            
            <nav>
                <a href="mailto:prueba@gmail.com">CONTACTO</a>
                <a href="https://facebook.com/" target="_blank" rel="noopener noreferrer">FACEBOOK</a>
                <a href="https://x.com/" target="_blank" rel="noopener noreferrer">X</a>
            </nav>
        </div>

        <main>
            <!-- Asegúrate de que el nombre del archivo coincida -->
			<iframe 
				src="tu-archivo.pdf" 
				width="100%" 
				height="100%" 
				style="border: none;"
				title="Visor de PDF">
				<p>Tu navegador no admite visualización de PDFs. 
					<a href="tu-archivo.pdf">Haz clic aquí para descargarlo.</a>
				</p>
			</iframe>
		</main>
    </div>

<script>
    const tituloHeader = document.getElementById('titulo-dinamico');

    async function cargarTitulo() {
        try {
            const resTitulo = await fetch('titulo.txt');
            if (resTitulo.ok) {
                tituloHeader.innerText = await resTitulo.text();
            } else {
                tituloHeader.innerText = "Mi Página Web";
            }
        } catch (error) {
            console.error('Error al cargar el título:', error);
        }
    }

    cargarTitulo();
</script>

</body>
</html>
